<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 VR Viewer</title>
    
    <!-- Pannellum CSS & JS 라이브러리 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        /* 기본 여백 제거 및 화면 꽉 차게 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        
        /* 파노라마 뷰어 컨테이너 설정 */
        #panorama {
            width: 100vw;
            height: 100vh;
        }

        /* 불필요한 기본 UI 숨기기 (전체화면 아이콘, 정보 아이콘 등) */
        .pnlm-fullscreen-toggle-button, 
        .pnlm-about-msg {
            display: none !important;
        }

        /* 확대/축소 컨트롤 버튼 위치 (우측 하단으로 이동) */
        .pnlm-zoom-controls {
            position: absolute !important;
            top: auto !important;
            bottom: 30px !important;
            right: 30px !important;
            left: auto !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>

<!-- 뷰어가 렌더링될 영역 -->
<div id="panorama"></div>

<script>
    // Pannellum 뷰어 초기화
    pannellum.viewer('panorama', {
        "type": "equirectangular", // 360도 이미지 타입 지정
        "panorama": "vr.jpg",      // 사용할 이미지 파일명 지정
        "autoLoad": true,          // 페이지 로드 시 자동 실행
        "mouseZoom": true,         // 마우스 스크롤로 확대/축소 허용
        "showControls": true,      // 줌 컨트롤 아이콘 표시
        "compass": false,          // 나침반 UI 숨기기
        "minPitch": -90,           // 상하 회전 최소 각도
        "maxPitch": 90             // 상하 회전 최대 각도
    });
</script>

</body>
</html>
